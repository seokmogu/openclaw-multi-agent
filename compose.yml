# OpenClaw Multi-Agent Service Implementation System — Podman Compose
#
# 사용법:
#   podman-compose up -d        # 시작
#   podman-compose logs -f      # 로그 확인
#   podman-compose down         # 중지
#   podman-compose exec gateway openclaw channels status  # 채널 상태
#
# 포트 격리:
#   컨테이너 내부는 항상 18789. 호스트 포트는 .env의 HOST_GATEWAY_PORT로 변경.
#   다른 OpenClaw 프로젝트와 절대 충돌하지 않음.

services:
  gateway:
    build:
      context: .
      dockerfile: Containerfile
    container_name: ocma-gateway
    restart: unless-stopped
    init: true

    environment:
      HOME: /home/node
      TERM: xterm-256color
      PROJECT_ROOT: /project
      # Optional extra CA bundle mounted from host. By default this points at the
      # standard system CA bundle path inside the container.
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/extra-ca-certificates.crt

      # Git configuration (override in .env)
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-OCMA Bot}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-ocma-bot@users.noreply.github.com}
      GIT_COMMITTER_NAME: ${GIT_AUTHOR_NAME:-OCMA Bot}
      GIT_COMMITTER_EMAIL: ${GIT_AUTHOR_EMAIL:-ocma-bot@users.noreply.github.com}
      GIT_OPTIONAL_LOCKS: "0"

      # GitHub auth (refresh token in .env before restart)
      GH_TOKEN: ${GH_TOKEN:-}

      # Gateway auth
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # Slack integration
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}

      # LLM auth: API key 사용 금지. OAuth/로그인 인증만 사용.
      # - OpenClaw agents: auth-profiles.json (OAuth tokens)
      # - Claude Code CLI: ~/.claude (로그인 인증)
      # - Codex CLI: ~/.codex/auth.json (ChatGPT Pro OAuth)
      # - Gemini CLI: ~/.gemini + GOOGLE_API_KEY
      #
      # OPENAI_API_KEY를 명시적으로 비워서 호스트 env 유입 차단
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

    volumes:
      # OpenClaw config + agent state
      - ./container-config:/home/node/.openclaw

      # Project files (agents, state, tools, skills)
      - ./agents:/project/agents
      - ./tools:/project/tools:ro
      - ./skills:/project/skills:ro
      - ./state:/project/state
      - ./workspaces:/project/workspaces

      # Host repo root (for self-deploy: git pull after PR merge)
      - .:/project/host-repo

      # Optional host CA bundle override. If you do not need a custom CA, leave
      # EXTRA_CA_CERT_PATH unset and the default system bundle path will be used.
      - ${EXTRA_CA_CERT_PATH:-/etc/ssl/certs/ca-certificates.crt}:/etc/ssl/certs/extra-ca-certificates.crt:ro

      # CLI credential dirs from host (read-only)
      - ${HOME}/.claude.json:/home/node/.claude.json:ro
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.codex:/home/node/.codex:rw
      - ${HOME}/.gemini:/home/node/.gemini:rw

      # Host project repos (read-only reference)
      - ${HOME}/project:/workspace:ro
      # GitHub CLI auth (read-only — for gh auth token extraction)
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      # SSH keys (read-only — fallback auth for git push)
      - ${HOME}/.ssh:/home/node/.ssh:ro

    ports:
      - "${HOST_GATEWAY_PORT:-19789}:18789"

    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
